version: 0.2
phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies
      - cd frontend && npm install
      - cd ../backend && npm install
  build:
    commands:
      - echo Building frontend
      - cd frontend && CI=false npm run build
  post_build:
    commands:
      - echo Build complete
artifacts:
  files:
    - '**/*'
  base-directory: '.'